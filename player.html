<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- v2.14.19 — disable browser pinch-zoom so the canvas-level
       pinch handler (PlayerApp clamped zoom into the GM crop) gets
       the gesture. Without user-scalable=no, iOS Safari and some
       Android Chrome builds intercept pinch before our pointer
       handlers see it. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#000000" />
  <title>Mappadux — Player</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
  <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="stylesheet" href="/src/styles/main.css" />
</head>
<body class="player-view">

  <canvas id="renderer-canvas"></canvas>

  <!-- Transition overlay canvas — drawn on by TransitionEngine during map changes -->
  <canvas id="transition-canvas"></canvas>

  <!-- v2.14.17 — 1" grid overlay (map-relative). Drawn when the GM
       has toggled Show Grid on the Player View rect AND the active
       map is calibrated. Spacing scales with the player's view crop
       so the grid moves with the map on window resize / zoom. -->
  <canvas id="player-grid"></canvas>

  <!-- HTML screen-space layer for marker labels — stays readable independent
       of the map's render scale. -->
  <div id="marker-overlay" class="marker-overlay"></div>

  <!-- v2.17 Player Voice — player tokens (circular, edged in each player's colour). -->
  <div id="player-marker-layer" class="player-marker-layer"></div>

  <!-- v2.17 Player Voice — ping pulses (this player's + others', relayed by the GM). -->
  <div id="ping-layer" class="ping-layer"></div>

  <!-- v2.17 Player Voice — incoming message toasts (GM replies, other players). -->
  <div id="player-msg-toasts" class="player-msg-toasts"></div>

  <!-- v2.17 Player Voice — atmospheric initiative rail (the player face). -->
  <div id="player-initiative" class="player-init" hidden></div>

  <!-- v2.16.77 — read-only whiteboard mirrored from the GM. -->
  <canvas id="annotate-whiteboard" class="annotate-whiteboard"></canvas>
  <!-- v2.16.76 — read-only progress clocks mirrored from the GM. -->
  <div id="annotate-clocks" class="annotate-clocks"></div>

  <!-- Status overlay — shown while connecting or on errors -->
  <div id="status" hidden></div>

  <!-- Floating fullscreen toggle — auto-fades when idle. -->
  <button id="player-fullscreen-btn" class="player-fullscreen-btn" title="Toggle fullscreen">⛶ Fullscreen</button>

  <!-- v2.17 Player Voice — identity button. Shows your colour + name; click to
       set or change who you are (sent to the GM). -->
  <button id="player-identity-btn" class="player-identity-btn" title="Set or change your name, character, and colour">
    <span class="player-identity-dot" aria-hidden="true"></span>
    <span class="player-identity-label">Set name</span>
  </button>

  <!-- v2.14.18 — player-side zoom + pan reset. Visible only once
       the player has pan/zoomed away from the GM's broadcast view;
       click to snap back to the GM-prescribed crop. -->
  <button id="player-reset-view-btn" class="player-reset-view-btn" title="Reset view to what the GM has set" hidden>↺ Reset view</button>

  <!-- Connect panel — shown when no room code in URL -->
  <div id="connect-panel" class="connect-panel" hidden>
    <h1 class="connect-title">Mappadux <span class="connect-byline">— VTT@Home</span></h1>
    <p class="connect-sub">Enter the room code shown on the GM screen</p>
    <div class="connect-row">
      <input type="text" id="room-input" class="room-input" placeholder="e.g. abc-1234-xyz" autocomplete="off" />
      <button id="connect-btn" class="btn btn--primary">Connect</button>
    </div>
  </div>

  <script type="module" src="/src/player.ts"></script>
</body>
</html>
