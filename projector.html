<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#000000" />
  <title>Mappadux — Projector</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
  <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="stylesheet" href="/src/styles/main.css" />
</head>
<body class="projector-view">

  <canvas id="renderer-canvas"></canvas>

  <!-- Transition overlay — used by TransitionEngine when the GM has
       enabled animations on the Scaled View (Settings → Scaled View
       → Enable transitions). The canvas is inert until the engine
       paints into it; it sits above the renderer-canvas and inherits
       its rotation via projector-view's data-rot CSS. -->
  <canvas id="transition-canvas"></canvas>

  <!-- HTML screen-space layer for marker labels — stays readable independent
       of the map's render scale. -->
  <div id="marker-overlay" class="marker-overlay"></div>

  <!-- v2.17 Player Voice — player tokens, pings, and the atmospheric
       initiative rail. Same containers as the player view so the projector
       (the table screen) shows the same Player Voice content. -->
  <div id="player-marker-layer" class="player-marker-layer"></div>
  <div id="ping-layer" class="ping-layer"></div>
  <div id="player-initiative" class="player-init" hidden></div>
  <!-- v2.16.77 — read-only whiteboard mirrored from the GM. -->
  <canvas id="annotate-whiteboard" class="annotate-whiteboard"></canvas>
  <!-- v2.16.76 — read-only progress clocks mirrored from the GM. -->
  <div id="annotate-clocks" class="annotate-clocks"></div>
  <!-- v2.16.78 — read-only timers / countdowns mirrored from the GM. -->
  <div id="annotate-timers" class="annotate-clocks"></div>
  <!-- v2.16.80 — read-only player notes mirrored from the GM. -->
  <!-- v2.16.91 — live YouTube videos on a text-map page. -->
  <div id="textmap-video-layer" class="textmap-video-layer"></div>
  <div id="annotate-notes" class="annotate-notes"></div>

  <!-- Status overlay — shown while connecting or on errors -->
  <div id="status" hidden></div>

  <!-- Connect panel — shown when no room code in URL -->
  <div id="connect-panel" class="connect-panel" hidden>
    <h1 class="connect-title">Mappadux — Projector</h1>
    <p class="connect-sub">Enter the room code shown on the GM screen</p>
    <div class="connect-row">
      <input type="text" id="room-input" class="room-input" placeholder="e.g. abc-1234-xyz" autocomplete="off" />
      <button id="connect-btn" class="btn btn--primary">Connect</button>
    </div>
  </div>

  <!-- Calibration prompt — shown when no projector calibration is set up yet -->
  <div id="calibration-prompt" class="calibration-prompt" hidden>
    <h1>Projector not yet calibrated</h1>
    <p>Tell this device how many of its pixels equal one inch on the projection surface. Once calibrated, this window will render maps at true table scale.</p>
    <button id="calibrate-btn" class="btn btn--primary">Calibrate this device</button>
  </div>

  <!-- Floating controls panel — fade-out when idle, accessible via right-click -->
  <div id="projector-controls" class="projector-controls" hidden>
    <span class="projector-setup-label"></span>
    <button id="recalibrate-btn"  class="btn btn--ghost btn--xs" title="Re-calibrate this device">⚙ Calibrate</button>
    <button id="fullscreen-btn"   class="btn btn--ghost btn--xs" title="Toggle fullscreen">⛶ Fullscreen</button>
  </div>

  <script type="module" src="/src/projector.ts"></script>
</body>
</html>
